services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.telegram_bot"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles:
      - bot

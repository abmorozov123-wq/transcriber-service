name: Build RunPod Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "runpod_worker/**"
      - ".github/workflows/build-runpod-worker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod_worker/Dockerfile
          push: true
          tags: |
            docker.io/morant123/transcriber-runpod-worker:latest
            docker.io/morant123/transcriber-runpod-worker:${{ github.sha }}
